name: Deployment

on:
    push:
        branches:
            - main

    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    # Build
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install just
              uses: extractions/setup-just@v3

            - name: Setup Node
              uses: alpheusci/setup-node@v1

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Build packages
              run: just build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    # Deploy
    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
